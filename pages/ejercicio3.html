<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trabajo práctico N° 5 de DOM y BOM" />
    <meta name="author" content="Holmquist Ignacio" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style2.css" />
    <title>Ejercicio 3 - Lista de Tareas</title>
  </head>
  <body>
    <header></header>
    <main>
      <article class="w-50 mx-auto">
        <h1 class="text-center">Lista de tareas</h1>
        <form id="formtarea">
          <div class="mb-3">
            <label for="inputtarea" class="form-label lead">Tarea</label>
            <input
              type="text"
              class="form-control"
              id="tarea"
              aria-describedby="tareaayuda"
              placeholder="Ingresa una tarea"
              minlength="2"
              maxlength="200"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Enviar</button>
          <ul class="list-group mt-3">
          </ul>
        </form>
      </article>
      <button class="btn btn-secondary volver">
        <i class="bi bi-skip-backward-fill"></i
        ><a href="../index.html"> Volver al inicio</a>
      </button>
    </main>
    <footer class="py-4">
      <h6>&copy; 2026 TP5 - DOM y BOM. Todos los derechos reservados</h6>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
    <script src="../js/ejercicio3.js"></script>
  </body>
