<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Trabajo práctico N° 5 de DOM y BOM" />
    <meta name="author" content="Holmquist Ignacio" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style2.css" />
    <title>Ejercicio 2 - Generaciones</title>
  </head>
  <body>
    <header></header>
    <main>
      <h1 class="text-center mb-3">Ingresa tus datos</h1>
      <form class="w-50 mx-auto" id="formulario">
        <div class="mb-2">
          <label for="inputnombre" class="form-label"
            >Nombre completo</label
          >
          <input
            type="text"
            class="form-control"
            id="nombre"
            aria-describedby="Nombreayuda"
            placeholder="Ingresa tu nombre y apellido"
          />
        </div>
        <div class="mb-2">
          <label for="inputedad" class="form-label">Edad</label>
          <input
            type="number"
            class="form-control"
            id="edad"
            placeholder="Ingresa tu edad"
          />
        </div>
        <div class="mb-2">
          <label for="inputdni" class="form-label">DNI</label>
          <input
            type="number"
            class="form-control"
            id="dni"
            placeholder="ingresa tu DNI"
          />
        </div>
        <div class="mb-2">
          <label for="inputsexo" class="form-label">Sexo</label>
          <input
            type="text"
            class="form-control"
            id="sexo"
            placeholder="ingresa tu sexo"
          />
        </div>
        <div class="mb-2">
          <label for="inputpeso" class="form-label">Peso</label>
          <input
            type="number"
            class="form-control"
            id="peso"
            placeholder="ingresa tu peso en kg"
          />
        </div>
        <div>
          <label for="inputaltura" class="form-label">Altura</label>
          <input
            type="number"
            class="form-control"
            id="altura"
            placeholder="ingresa tu altura en cm"
          />
        </div>
        <button type="submit" class="btn btn-primary my-3">Enviar datos</button>
        <button type="button" class="btn btn-success my-3">Mostrar generacion</button>
        <button type="button" class="btn btn-warning my-3">Mostrar datos</button>
    </form>
      
      <button class="btn btn-secondary volver">
        <i class="bi bi-skip-backward-fill"></i
        ><a href="../index.html"> Volver al inicio</a>
      </button>
    </main>
    <footer class="py-4">
      <h6>&copy; 2026 TP5 - DOM y BOM. Todos los derechos reservados</h6>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../js/ejercicio2.js"></script>
  </body>
</html>
